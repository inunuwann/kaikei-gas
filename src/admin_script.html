<script>
  class AdminDashboardApp {
    constructor() {
      this.logger = window.createDebugLogger('AdminDashboardApp');
      this.criteria = this.createDefaultCriteria();
      this.filterOptions = { groups: [], types: [] };
      this.expenditures = [];
      this.inquiries = [];
      this.activeTab = 'expenditure';
      this.inquiriesLoaded = false;
      this.isLoadingInquiries = false;
      this.expBody = document.getElementById('expBody');
      this.inqBody = document.getElementById('inqBody');
      this.dateRangePicker = document.getElementById('filterDateRangePicker');
      this.dateRangeTrigger = document.getElementById('filterDateRangeTrigger');
      this.dateRangePopover = document.getElementById('filterDateRangePopover');
      this.dateRangeGrid = document.getElementById('filterDateRangeGrid');
      this.dateMonthLabel = document.getElementById('filterDateMonthLabel');
      this.dateRangeSummary = document.getElementById('filterDateRangeSummary');
      this.dateFromInput = document.getElementById('filterDateFrom');
      this.dateToInput = document.getElementById('filterDateTo');
      this.datePickerMonth = this.toMonthStart(new Date());
      this.logger.log('constructed', {
        hasBootstrapData: this.hasBootstrapData()
      });
    }

    init() {
      const timer = this.logger.startTimer('init');
      document
        .getElementById('searchBtn')
        .addEventListener('click', () => this.applyFiltersFromForm());
      document
        .getElementById('resetBtn')
        .addEventListener('click', () => this.resetFilters());
      document
        .getElementById('filterAmountMode')
        .addEventListener('change', () => this.updateAmountFilterInputs());
      this.dateRangeTrigger.addEventListener('click', (event) => this.handleDateRangeTriggerClick(event));
      document
        .getElementById('filterDatePrevMonth')
        .addEventListener('click', () => this.shiftDatePickerMonth(-1));
      document
        .getElementById('filterDateNextMonth')
        .addEventListener('click', () => this.shiftDatePickerMonth(1));
      document
        .getElementById('filterDateRangeClear')
        .addEventListener('click', () => this.clearDateRange());
      this.dateRangeGrid.addEventListener('click', (event) => this.handleDateRangeGridClick(event));
      document.addEventListener('click', (event) => this.handleDocumentClick(event));
      this.expBody.addEventListener('change', (event) => this.handleStatusSelectChange(event));
      this.inqBody.addEventListener('change', (event) => this.handleStatusSelectChange(event));

      this.applyCriteriaToForm();
      this.updateAmountFilterInputs();
      if (this.hasBootstrapData()) {
        this.logger.log('using-embedded-bootstrap');
        this.handleBootstrapData(ADMIN_DASHBOARD_BOOTSTRAP);
        timer.end({
          bootstrapSource: 'template'
        });
        return;
      }

      this.renderLoadingState();
      this.loadBootstrap();
      timer.end({
        bootstrapSource: 'rpc'
      });
    }

    createDefaultCriteria() {
      return {
        idQuery: '',
        dateFrom: '',
        dateTo: '',
        groups: [],
        types: [],
        amountMode: 'none',
        amountValue: null,
        amountMin: null,
        amountMax: null,
        contentQuery: '',
        sortBy: 'date',
        sortOrder: 'desc'
      };
    }

    loadBootstrap() {
      const timer = this.logger.startTimer('loadBootstrap');
      this.renderLoadingState();

      google.script.run
        .withSuccessHandler((data) => {
          timer.end({
            expenditureCount: Array.isArray(data && data.expenditures) ? data.expenditures.length : 0
          });
          this.handleBootstrapData(data);
        })
        .withFailureHandler((error) => {
          timer.fail(error);
          this.handleLoadError(error, 'dashboard');
        })
        .getAdminDashboardBootstrap();
    }

    hasBootstrapData() {
      return Boolean(
        typeof ADMIN_DASHBOARD_BOOTSTRAP !== 'undefined' &&
        ADMIN_DASHBOARD_BOOTSTRAP &&
        Array.isArray(ADMIN_DASHBOARD_BOOTSTRAP.expenditures)
      );
    }

    handleBootstrapData(data) {
      this.expenditures = Array.isArray(data.expenditures) ? data.expenditures : [];
      this.filterOptions = data.filterOptions || this.buildFilterOptions(this.expenditures);
      this.criteria = this.normalizeCriteria(data.criteria || this.criteria);
      this.logger.log('handleBootstrapData', {
        expenditureCount: this.expenditures.length,
        groupFilterCount: this.filterOptions.groups.length,
        typeFilterCount: this.filterOptions.types.length
      });
      this.renderFilterOptions();
      this.applyCriteriaToForm();
      this.renderExpenditures(this.getFilteredExpenditures());
      this.renderInquiryIdleState();
    }

    ensureInquiriesLoaded(forceReload) {
      const timer = this.logger.startTimer('ensureInquiriesLoaded', {
        forceReload: Boolean(forceReload)
      });
      const shouldReload = Boolean(forceReload);
      if (this.isLoadingInquiries) {
        timer.end({
          skipped: 'already-loading'
        });
        return;
      }

      if (this.inquiriesLoaded && !shouldReload) {
        if (this.activeTab === 'inquiry') {
          this.renderInquiries(this.inquiries);
        }
        timer.end({
          skipped: 'already-loaded',
          inquiryCount: this.inquiries.length
        });
        return;
      }

      this.isLoadingInquiries = true;
      this.inqBody.innerHTML = '<tr><td colspan="7" style="text-align:center;">読み込み中...</td></tr>';

      google.script.run
        .withSuccessHandler((data) => {
          this.isLoadingInquiries = false;
          this.inquiriesLoaded = true;
          this.inquiries = Array.isArray(data.inquiries) ? data.inquiries : [];
          timer.end({
            inquiryCount: this.inquiries.length
          });
          if (this.activeTab === 'inquiry') {
            this.renderInquiries(this.inquiries);
          }
        })
        .withFailureHandler((error) => {
          this.isLoadingInquiries = false;
          timer.fail(error);
          this.handleLoadError(error, 'inquiry');
        })
        .getInquiryDashboardData();
    }

    reloadAllLoadedData() {
      this.logger.log('reloadAllLoadedData', {
        activeTab: this.activeTab,
        inquiriesLoaded: this.inquiriesLoaded
      });
      this.loadBootstrap();
      if (this.inquiriesLoaded || this.activeTab === 'inquiry') {
        this.ensureInquiriesLoaded(true);
      }
    }

    setActiveTab(tabName) {
      this.activeTab = tabName;
      this.logger.log('setActiveTab', {
        tabName
      });
      if (tabName === 'inquiry') {
        this.ensureInquiriesLoaded(false);
      } else {
        this.renderExpenditures(this.getFilteredExpenditures());
      }
    }

    handleLoadError(error, scope) {
      this.logger.error('handleLoadError', {
        scope,
        error
      });
      const message = `読み込みエラー: ${error}`;
      const escaped = this.escapeHtml(message);

      if (scope === 'inquiry') {
        this.inqBody.innerHTML = `<tr><td colspan="7" style="text-align:center;">${escaped}</td></tr>`;
        return;
      }

      this.expBody.innerHTML = `<tr><td colspan="8" style="text-align:center;">${escaped}</td></tr>`;
      this.inqBody.innerHTML = `<tr><td colspan="7" style="text-align:center;">${escaped}</td></tr>`;
    }

    renderLoadingState() {
      this.expBody.innerHTML = '<tr><td colspan="8" style="text-align:center;">読み込み中...</td></tr>';
      this.renderInquiryIdleState();
    }

    renderInquiryIdleState() {
      if (this.inquiriesLoaded || this.isLoadingInquiries) {
        return;
      }

      this.inqBody.innerHTML =
        '<tr><td colspan="7" style="text-align:center;">お問い合わせタブを開くと読み込みます。</td></tr>';
    }

    renderFilterOptions() {
      this.logger.log('renderFilterOptions', {
        groupFilterCount: this.filterOptions.groups.length,
        typeFilterCount: this.filterOptions.types.length
      });
      this.renderCheckboxGroup(
        'groupFilterList',
        'groupFilter',
        this.filterOptions.groups,
        this.criteria.groups
      );
      this.renderCheckboxGroup(
        'typeFilterList',
        'typeFilter',
        this.filterOptions.types,
        this.criteria.types
      );
    }

    renderCheckboxGroup(containerId, name, options, selectedValues) {
      const container = document.getElementById(containerId);

      if (!Array.isArray(options) || options.length === 0) {
        container.innerHTML = '<div class="empty-note">候補がありません</div>';
        return;
      }

      const selected = new Set(selectedValues || []);
      container.innerHTML = options
        .map((optionValue, index) => {
          const checked = selected.has(optionValue) ? 'checked' : '';
          return `
            <label class="checkbox-item">
              <input
                type="checkbox"
                name="${this.escapeAttribute(name)}"
                value="${this.escapeAttribute(optionValue)}"
                id="${this.escapeAttribute(name)}-${index}"
                ${checked}
              >
              <span>${this.escapeHtml(optionValue)}</span>
            </label>
          `;
        })
        .join('');
    }

    buildFilterOptions(records) {
      return {
        groups: this.uniqueSorted(records.map((record) => record.group)),
        types: this.uniqueSorted(records.map((record) => record.type))
      };
    }

    uniqueSorted(values) {
      return [...new Set((values || []).filter(Boolean))].sort((left, right) => {
        return this.compareText(left, right);
      });
    }

    applyCriteriaToForm() {
      document.getElementById('filterId').value = this.criteria.idQuery || '';
      this.dateFromInput.value = this.criteria.dateFrom || '';
      this.dateToInput.value = this.criteria.dateTo || '';
      document.getElementById('filterContent').value = this.criteria.contentQuery || '';
      document.getElementById('filterAmountMode').value = this.criteria.amountMode || 'none';
      document.getElementById('filterAmountValue').value =
        this.criteria.amountValue === null ? '' : String(this.criteria.amountValue);
      document.getElementById('filterAmountMin').value =
        this.criteria.amountMin === null ? '' : String(this.criteria.amountMin);
      document.getElementById('filterAmountMax').value =
        this.criteria.amountMax === null ? '' : String(this.criteria.amountMax);
      document.getElementById('filterSortBy').value = this.criteria.sortBy || 'date';
      document.getElementById('filterSortOrder').value = this.criteria.sortOrder || 'desc';

      this.updateAmountFilterInputs();
      this.syncDatePickerMonth();
      this.updateDateRangeTrigger();
      this.renderDateRangePicker();
      this.applyCheckedValues('groupFilter', this.criteria.groups);
      this.applyCheckedValues('typeFilter', this.criteria.types);
    }

    applyCheckedValues(name, selectedValues) {
      const selectedSet = new Set(selectedValues || []);
      document.querySelectorAll(`input[name="${name}"]`).forEach((checkbox) => {
        checkbox.checked = selectedSet.has(checkbox.value);
      });
    }

    updateAmountFilterInputs() {
      const mode = document.getElementById('filterAmountMode').value;
      const amountValue = document.getElementById('filterAmountValue');
      const amountRange = document.getElementById('filterAmountRange');

      amountValue.style.display =
        mode === 'exact' || mode === 'min' || mode === 'max' ? 'block' : 'none';
      amountRange.style.display = mode === 'range' ? 'grid' : 'none';
    }

    handleDateRangeTriggerClick(event) {
      event.stopPropagation();
      if (this.dateRangePopover.classList.contains('open')) {
        this.closeDateRangePicker();
        return;
      }

      this.openDateRangePicker();
    }

    handleDocumentClick(event) {
      if (!this.dateRangePopover.classList.contains('open')) {
        return;
      }

      if (this.dateRangePicker.contains(event.target)) {
        return;
      }

      this.closeDateRangePicker();
    }

    openDateRangePicker() {
      this.syncDatePickerMonth();
      this.renderDateRangePicker();
      this.dateRangePopover.classList.add('open');
      this.logger.log('openDateRangePicker', {
        dateFrom: this.criteria.dateFrom || null,
        dateTo: this.criteria.dateTo || null
      });
    }

    closeDateRangePicker() {
      this.dateRangePopover.classList.remove('open');
      this.logger.log('closeDateRangePicker');
    }

    shiftDatePickerMonth(offset) {
      this.datePickerMonth = new Date(
        this.datePickerMonth.getFullYear(),
        this.datePickerMonth.getMonth() + offset,
        1
      );
      this.renderDateRangePicker();
    }

    syncDatePickerMonth() {
      const baseDateKey = this.criteria.dateFrom || this.criteria.dateTo || this.normalizeDateKey(new Date());
      this.datePickerMonth = this.toMonthStart(this.parseDateKey(baseDateKey));
    }

    renderDateRangePicker() {
      const monthStart = this.toMonthStart(this.datePickerMonth);
      const year = monthStart.getFullYear();
      const month = monthStart.getMonth();
      const firstWeekday = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      this.dateMonthLabel.textContent = `${year}年${month + 1}月`;
      this.dateRangeGrid.innerHTML = '';

      const cells = [];
      for (let blankIndex = 0; blankIndex < firstWeekday; blankIndex += 1) {
        cells.push('<div class="date-range-day-empty"></div>');
      }

      for (let day = 1; day <= daysInMonth; day += 1) {
        const dateKey = this.normalizeDateKey(new Date(year, month, day));
        const isSelected =
          dateKey === this.criteria.dateFrom || dateKey === this.criteria.dateTo;
        const isInRange =
          this.criteria.dateFrom &&
          this.criteria.dateTo &&
          this.criteria.dateFrom <= dateKey &&
          dateKey <= this.criteria.dateTo;
        const classNames = ['date-range-day'];
        if (isInRange) {
          classNames.push('is-in-range');
        }
        if (isSelected) {
          classNames.push('is-selected');
        }

        cells.push(`
          <button
            type="button"
            class="${classNames.join(' ')}"
            data-date-key="${this.escapeAttribute(dateKey)}"
          >
            ${day}
          </button>
        `);
      }

      this.dateRangeGrid.innerHTML = cells.join('');
      this.updateDateRangeSummary();
    }

    handleDateRangeGridClick(event) {
      const button = event.target.closest('[data-date-key]');
      if (!button) {
        return;
      }

      const dateKey = button.dataset.dateKey;
      if (!dateKey) {
        return;
      }

      this.handleDateRangeSelection(dateKey);
    }

    handleDateRangeSelection(dateKey) {
      const currentFrom = this.criteria.dateFrom;
      const currentTo = this.criteria.dateTo;

      this.logger.log('handleDateRangeSelection', {
        selectedDate: dateKey,
        currentFrom: currentFrom || null,
        currentTo: currentTo || null
      });

      if (!currentFrom || !currentTo || currentFrom !== currentTo) {
        this.setDateRange(dateKey, dateKey);
        return;
      }

      if (dateKey < currentFrom) {
        this.setDateRange(dateKey, dateKey);
        return;
      }

      this.setDateRange(currentFrom, dateKey);
      this.closeDateRangePicker();
    }

    setDateRange(dateFrom, dateTo) {
      const normalizedFrom = this.normalizeDateKey(dateFrom);
      const normalizedTo = this.normalizeDateKey(dateTo);
      if (!normalizedFrom || !normalizedTo) {
        return;
      }

      this.criteria.dateFrom = normalizedFrom <= normalizedTo ? normalizedFrom : normalizedTo;
      this.criteria.dateTo = normalizedFrom <= normalizedTo ? normalizedTo : normalizedFrom;
      this.applyCriteriaToForm();
    }

    clearDateRange() {
      this.criteria.dateFrom = '';
      this.criteria.dateTo = '';
      this.applyCriteriaToForm();
      this.logger.log('clearDateRange');
    }

    updateDateRangeTrigger() {
      const hasDateRange = Boolean(this.criteria.dateFrom || this.criteria.dateTo);
      this.dateRangeTrigger.classList.toggle('is-empty', !hasDateRange);

      if (!hasDateRange) {
        this.dateRangeTrigger.textContent = '期間を選択してください';
        return;
      }

      if (this.criteria.dateFrom === this.criteria.dateTo) {
        this.dateRangeTrigger.textContent = this.formatDateRangeDisplay(this.criteria.dateFrom);
        return;
      }

      this.dateRangeTrigger.textContent = `${this.formatDateRangeDisplay(this.criteria.dateFrom)} - ${this.formatDateRangeDisplay(this.criteria.dateTo)}`;
    }

    updateDateRangeSummary() {
      if (!this.criteria.dateFrom || !this.criteria.dateTo) {
        this.dateRangeSummary.textContent = '開始日を選択してください';
        return;
      }

      if (this.criteria.dateFrom === this.criteria.dateTo) {
        this.dateRangeSummary.textContent = `${this.formatDateRangeDisplay(this.criteria.dateFrom)} を選択中です。別の日を選ぶと期間になります。`;
        return;
      }

      this.dateRangeSummary.textContent = `${this.formatDateRangeDisplay(this.criteria.dateFrom)} 〜 ${this.formatDateRangeDisplay(this.criteria.dateTo)}`;
    }

    formatDateRangeDisplay(dateKey) {
      return String(dateKey || '').replace(/-/g, '/');
    }

    parseDateKey(dateKey) {
      const normalized = this.normalizeDateKey(dateKey);
      if (!normalized) {
        return new Date();
      }

      const [year, month, day] = normalized.split('-').map((value) => Number(value));
      return new Date(year, month - 1, day);
    }

    toMonthStart(date) {
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }

    collectCriteriaFromForm() {
      return this.normalizeCriteria({
        idQuery: document.getElementById('filterId').value,
        dateFrom: document.getElementById('filterDateFrom').value,
        dateTo: document.getElementById('filterDateTo').value,
        groups: this.collectCheckedValues('groupFilter'),
        types: this.collectCheckedValues('typeFilter'),
        amountMode: document.getElementById('filterAmountMode').value,
        amountValue: document.getElementById('filterAmountValue').value,
        amountMin: document.getElementById('filterAmountMin').value,
        amountMax: document.getElementById('filterAmountMax').value,
        contentQuery: document.getElementById('filterContent').value,
        sortBy: document.getElementById('filterSortBy').value,
        sortOrder: document.getElementById('filterSortOrder').value
      });
    }

    collectCheckedValues(name) {
      return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(
        (checkbox) => checkbox.value
      );
    }

    normalizeCriteria(criteria) {
      return {
        idQuery: String(criteria.idQuery || '').trim(),
        dateFrom: this.normalizeDateKey(criteria.dateFrom),
        dateTo: this.normalizeDateKey(criteria.dateTo),
        groups: Array.isArray(criteria.groups) ? criteria.groups.filter(Boolean) : [],
        types: Array.isArray(criteria.types) ? criteria.types.filter(Boolean) : [],
        amountMode: ['none', 'exact', 'min', 'max', 'range'].includes(criteria.amountMode)
          ? criteria.amountMode
          : 'none',
        amountValue: this.parseNumber(criteria.amountValue),
        amountMin: this.parseNumber(criteria.amountMin),
        amountMax: this.parseNumber(criteria.amountMax),
        contentQuery: String(criteria.contentQuery || '').trim(),
        sortBy: criteria.sortBy === 'id' ? 'id' : 'date',
        sortOrder: criteria.sortOrder === 'asc' ? 'asc' : 'desc'
      };
    }

    normalizeDateKey(value) {
      if (!value) {
        return '';
      }

      if (value instanceof Date && !Number.isNaN(value.getTime())) {
        return [
          value.getFullYear(),
          String(value.getMonth() + 1).padStart(2, '0'),
          String(value.getDate()).padStart(2, '0')
        ].join('-');
      }

      const text = String(value).trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(text)) {
        return text;
      }

      const date = new Date(text);
      if (Number.isNaN(date.getTime())) {
        return '';
      }

      return [
        date.getFullYear(),
        String(date.getMonth() + 1).padStart(2, '0'),
        String(date.getDate()).padStart(2, '0')
      ].join('-');
    }

    parseNumber(value) {
      if (value === null || value === undefined || value === '') {
        return null;
      }
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : null;
    }

    applyFiltersFromForm() {
      this.criteria = this.collectCriteriaFromForm();
      const filteredRecords = this.getFilteredExpenditures();
      this.logger.log('applyFiltersFromForm', {
        criteria: this.criteria,
        resultCount: filteredRecords.length
      });
      this.renderExpenditures(filteredRecords);
    }

    resetFilters() {
      this.criteria = this.createDefaultCriteria();
      this.applyCriteriaToForm();
      const filteredRecords = this.getFilteredExpenditures();
      this.logger.log('resetFilters', {
        resultCount: filteredRecords.length
      });
      this.renderExpenditures(filteredRecords);
    }

    getFilteredExpenditures() {
      const criteria = this.criteria;
      return [...this.expenditures]
        .filter((record) => this.matchesRecord(record, criteria))
        .sort((left, right) => this.compareRecords(left, right, criteria));
    }

    matchesRecord(record, criteria) {
      const recordDateKey = this.normalizeDateKey(record.date);

      if (criteria.idQuery) {
        const normalizedId = this.normalizeText(record.id);
        if (!normalizedId.includes(this.normalizeText(criteria.idQuery))) {
          return false;
        }
      }

      if (criteria.dateFrom && recordDateKey && recordDateKey < criteria.dateFrom) {
        return false;
      }

      if (criteria.dateTo && recordDateKey && recordDateKey > criteria.dateTo) {
        return false;
      }

      if (criteria.groups.length > 0 && !criteria.groups.includes(record.group)) {
        return false;
      }

      if (criteria.types.length > 0 && !criteria.types.includes(record.type)) {
        return false;
      }

      if (!this.matchesAmount(Number(record.amount) || 0, criteria)) {
        return false;
      }

      if (criteria.contentQuery) {
        const normalizedContent = this.normalizeText(record.content);
        if (!normalizedContent.includes(this.normalizeText(criteria.contentQuery))) {
          return false;
        }
      }

      return true;
    }

    matchesAmount(amount, criteria) {
      switch (criteria.amountMode) {
        case 'exact':
          return criteria.amountValue === null ? true : amount === criteria.amountValue;
        case 'min':
          return criteria.amountValue === null ? true : amount >= criteria.amountValue;
        case 'max':
          return criteria.amountValue === null ? true : amount <= criteria.amountValue;
        case 'range':
          if (criteria.amountMin !== null && amount < criteria.amountMin) {
            return false;
          }
          if (criteria.amountMax !== null && amount > criteria.amountMax) {
            return false;
          }
          return true;
        case 'none':
        default:
          return true;
      }
    }

    compareRecords(left, right, criteria) {
      const orderFactor = criteria.sortOrder === 'asc' ? 1 : -1;
      const primary =
        criteria.sortBy === 'id'
          ? this.compareText(left.id, right.id)
          : this.toTimestamp(left.date) - this.toTimestamp(right.date);

      if (primary !== 0) {
        return primary * orderFactor;
      }

      const secondary =
        criteria.sortBy === 'id'
          ? this.toTimestamp(left.date) - this.toTimestamp(right.date)
          : this.compareText(left.id, right.id);

      return secondary * orderFactor;
    }

    toTimestamp(value) {
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? 0 : date.getTime();
    }

    normalizeText(value) {
      return String(value || '')
        .trim()
        .toLowerCase();
    }

    compareText(left, right) {
      return String(left || '').localeCompare(String(right || ''), 'ja', {
        numeric: true,
        sensitivity: 'base'
      });
    }

    renderExpenditures(records) {
      this.logger.log('renderExpenditures', {
        count: Array.isArray(records) ? records.length : 0
      });
      if (!Array.isArray(records) || records.length === 0) {
        this.expBody.innerHTML = '<tr><td colspan="8" style="text-align:center;">データなし</td></tr>';
        return;
      }

      this.expBody.innerHTML = records
        .map((record) => {
          const fileLink =
            record.file && record.file !== 'なし'
              ? `<a href="${this.escapeAttribute(record.file)}" target="_blank" class="link-btn">確認</a>`
              : '-';

          return `
            <tr>
              <td>${this.escapeHtml(record.id)}</td>
              <td>${this.escapeHtml(record.date)}</td>
              <td><strong>${this.escapeHtml(record.group)}</strong></td>
              <td>${this.escapeHtml(record.type)}</td>
              <td>¥${Number(record.amount).toLocaleString()}</td>
              <td style="max-width:220px; font-size:0.82em;">${this.escapeHtml(record.content)}</td>
              <td>${fileLink}</td>
              <td>
                <select
                  class="status-select"
                  data-type="expenditure"
                  data-row-index="${this.escapeAttribute(record.rowIndex)}"
                  data-status="${this.escapeAttribute(record.status)}"
                >
                  ${this.buildStatusOptions(
                    ['申請中', '承認済', '未精算', '精算完了', '却下'],
                    record.status
                  )}
                </select>
              </td>
            </tr>
          `;
        })
        .join('');
    }

    renderInquiries(records) {
      this.logger.log('renderInquiries', {
        count: Array.isArray(records) ? records.length : 0
      });
      if (!Array.isArray(records) || records.length === 0) {
        this.inqBody.innerHTML = '<tr><td colspan="7" style="text-align:center;">データなし</td></tr>';
        return;
      }

      this.inqBody.innerHTML = records
        .map((record) => {
          return `
            <tr>
              <td>${this.escapeHtml(record.id)}</td>
              <td>${this.escapeHtml(record.date)}</td>
              <td>${this.escapeHtml(record.group)}</td>
              <td style="font-size:0.82em;">${this.escapeHtml(record.sender)}</td>
              <td>${this.escapeHtml(record.subject)}</td>
              <td style="max-width:300px; font-size:0.82em;">${this.escapeHtml(record.message)}</td>
              <td>
                <select
                  class="status-select"
                  data-type="inquiry"
                  data-row-index="${this.escapeAttribute(record.rowIndex)}"
                  data-status="${this.escapeAttribute(record.status)}"
                >
                  ${this.buildStatusOptions(['未対応', '対応中', '完了'], record.status)}
                </select>
              </td>
            </tr>
          `;
        })
        .join('');
    }

    buildStatusOptions(options, currentValue) {
      return options
        .map((option) => {
          const selected = currentValue === option ? 'selected' : '';
          return `<option value="${this.escapeAttribute(option)}" ${selected}>${this.escapeHtml(option)}</option>`;
        })
        .join('');
    }

    handleStatusSelectChange(event) {
      const select = event.target.closest('.status-select');
      if (!select) {
        return;
      }

      this.logger.log('handleStatusSelectChange', {
        type: select.dataset.type,
        rowIndex: Number(select.dataset.rowIndex),
        nextStatus: select.value
      });
      this.updateStatus(select);
    }

    updateStatus(select) {
      const timer = this.logger.startTimer('updateStatus');
      const type = select.dataset.type;
      const rowIndex = Number(select.dataset.rowIndex);
      const newStatus = select.value;
      const previousStatus = select.dataset.status || '';

      if (!type || !rowIndex || newStatus === previousStatus) {
        select.value = previousStatus;
        timer.end({
          skipped: true,
          type,
          rowIndex
        });
        return;
      }

      select.disabled = true;

      google.script.run
        .withSuccessHandler((result) => {
          select.disabled = false;
          if (!result || result.success === false) {
            select.value = previousStatus;
            timer.end({
              success: false,
              type,
              rowIndex
            });
            alert(result && result.message ? result.message : '更新に失敗しました。');
            return;
          }

          timer.end({
            success: true,
            type,
            rowIndex,
            newStatus
          });
          this.applyLocalStatusUpdate(type, rowIndex, newStatus);
        })
        .withFailureHandler((error) => {
          select.disabled = false;
          select.value = previousStatus;
          timer.fail(error, {
            type,
            rowIndex
          });
          alert(`更新エラー: ${error}`);
        })
        .updateStatus(type, rowIndex, newStatus);
    }

    applyLocalStatusUpdate(type, rowIndex, newStatus) {
      this.logger.log('applyLocalStatusUpdate', {
        type,
        rowIndex,
        newStatus
      });
      const targetRecords = type === 'inquiry' ? this.inquiries : this.expenditures;
      const targetRecord = targetRecords.find((record) => Number(record.rowIndex) === rowIndex);

      if (targetRecord) {
        targetRecord.status = newStatus;
      }

      if (type === 'inquiry') {
        this.renderInquiries(this.inquiries);
        return;
      }

      this.renderExpenditures(this.getFilteredExpenditures());
    }

    escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    escapeAttribute(value) {
      return this.escapeHtml(value).replace(/`/g, '&#96;');
    }
  }

  const adminDashboardApp = new AdminDashboardApp();

  function showTab(tabName, button) {
    document.getElementById('tab-expenditure').style.display = 'none';
    document.getElementById('tab-inquiry').style.display = 'none';
    document.getElementById(`tab-${tabName}`).style.display = 'block';

    document.querySelectorAll('.nav-btn').forEach((navButton) => {
      navButton.classList.remove('active');
    });
    if (button) {
      button.classList.add('active');
    }

    adminDashboardApp.setActiveTab(tabName);
  }

  function reloadCurrentFilters() {
    adminDashboardApp.reloadAllLoadedData();
  }

  window.addEventListener('DOMContentLoaded', () => {
    adminDashboardApp.init();
  });
</script>
