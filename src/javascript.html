<script>
  class ItemsTableController {
    constructor(tbody, grandTotalEl, allowedItems) {
      this.logger = window.createDebugLogger('ItemsTableController');
      this.tbody = tbody;
      this.grandTotalEl = grandTotalEl;
      this.allowedItems = Array.isArray(allowedItems) ? allowedItems : [];
      this.requestType = '事後請求';
      this.logger.log('constructed', {
        allowedItemCount: this.allowedItems.length
      });

      this.tbody.addEventListener('input', (event) => this.handleInput(event));
      this.tbody.addEventListener('change', (event) => this.handleChange(event));
      this.tbody.addEventListener('click', (event) => this.handleClick(event));
    }

    reset(requestType) {
      this.requestType = requestType || '事後請求';
      this.tbody.innerHTML = '';
      this.addRows(3);
      this.calculateTotal();
      this.logger.log('reset', {
        requestType: this.requestType,
        rowCount: this.tbody.rows.length
      });
    }

    addRows(count) {
      for (let index = 0; index < count; index += 1) {
        this.tbody.appendChild(this.createRow());
      }
      this.calculateTotal();
      this.logger.log('addRows', {
        addedCount: count,
        rowCount: this.tbody.rows.length
      });
    }

    getItems() {
      const items = Array.from(this.tbody.querySelectorAll('tr'))
        .map((row) => {
          const selectEl = row.querySelector('.item-select');
          const inputEl = row.querySelector('.item-input');
          const itemName = selectEl ? selectEl.value : inputEl ? inputEl.value.trim() : '';
          return {
            item: itemName,
            price: row.querySelector('.price-input').value,
            qty: row.querySelector('.qty-input').value,
            subtotal: row.querySelector('.subtotal').dataset.value || '0'
          };
        })
        .filter((item) => item.item);
      this.logger.log('getItems', {
        itemCount: items.length
      });
      return items;
    }

    calculateTotal() {
      let total = 0;
      Array.from(this.tbody.querySelectorAll('tr')).forEach((row) => {
        const price = Number(row.querySelector('.price-input').value) || 0;
        const qty = Number(row.querySelector('.qty-input').value) || 0;
        const subtotal = price * qty;
        const subtotalCell = row.querySelector('.subtotal');
        subtotalCell.textContent = subtotal.toLocaleString();
        subtotalCell.dataset.value = String(subtotal);
        total += subtotal;
      });

      this.grandTotalEl.textContent = total.toLocaleString();
      this.grandTotalEl.dataset.value = String(total);
      this.logger.log('calculateTotal', {
        rowCount: this.tbody.rows.length,
        total
      });
      return total;
    }

    handleInput(event) {
      const target = event.target;
      if (!target.matches('.price-input, .qty-input, .item-input')) {
        return;
      }
      this.calculateTotal();
    }

    handleChange(event) {
      const target = event.target;
      if (!target.matches('.item-select')) {
        this.calculateTotal();
        return;
      }

      if (this.hasDuplicateSelection(target)) {
        this.logger.warn('duplicate-item-selection', {
          item: target.value
        });
        alert(`「${target.value}」は既に入力されています。`);
        target.value = '';
        this.resetRow(target);
        this.calculateTotal();
        return;
      }

      const selectedOption = target.options[target.selectedIndex];
      const defaultPrice = selectedOption ? selectedOption.dataset.price : '';
      if (defaultPrice) {
        const row = target.closest('tr');
        row.querySelector('.price-input').value = defaultPrice;
      }
      this.logger.log('item-selection-changed', {
        item: target.value,
        defaultPrice: defaultPrice || null
      });
      this.calculateTotal();
    }

    handleClick(event) {
      const deleteButton = event.target.closest('.del-btn');
      if (!deleteButton) {
        return;
      }

      if (this.tbody.rows.length <= 1) {
        return;
      }

      deleteButton.closest('tr').remove();
      this.calculateTotal();
      this.logger.log('row-deleted', {
        rowCount: this.tbody.rows.length
      });
    }

    createRow() {
      const row = document.createElement('tr');
      const freeInput = this.requestType === '事後請求' || this.requestType === '通常精算';
      row.innerHTML = `
        <td>${freeInput ? this.buildItemInput() : this.buildItemSelect()}</td>
        <td><input type="number" class="price-input input-sm" min="0" placeholder="0"></td>
        <td><input type="number" class="qty-input input-sm" min="1" value="1"></td>
        <td class="subtotal" data-value="0">0</td>
        <td><button type="button" class="del-btn">×</button></td>
      `;
      return row;
    }

    buildItemInput() {
      return '<input type="text" class="item-input input-sm" placeholder="品名を入力">';
    }

    buildItemSelect() {
      const options = ['<option value="">選択してください</option>'].concat(
        this.allowedItems.map((item) => {
          const price = item.defaultPrice === null || item.defaultPrice === undefined
            ? ''
            : String(item.defaultPrice);
          return `<option value="${this.escapeHtml(item.name)}" data-price="${this.escapeHtml(price)}">${this.escapeHtml(item.name)}</option>`;
        })
      );

      return `<select class="item-select input-sm">${options.join('')}</select>`;
    }

    hasDuplicateSelection(currentSelect) {
      if (!currentSelect.value) {
        return false;
      }

      return Array.from(this.tbody.querySelectorAll('.item-select')).some((select) => {
        return select !== currentSelect && select.value === currentSelect.value;
      });
    }

    resetRow(element) {
      const row = element.closest('tr');
      row.querySelector('.price-input').value = '';
      row.querySelector('.subtotal').textContent = '0';
      row.querySelector('.subtotal').dataset.value = '0';
    }

    escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  }

  class UserDashboardApp {
    constructor(bootstrap, allowedItems, unsettledData) {
      this.logger = window.createDebugLogger('UserDashboardApp');
      this.bootstrap = bootstrap || {};
      this.allowedItems = Array.isArray(allowedItems) ? allowedItems : [];
      this.unsettledData = unsettledData || null;
      this.mode = 'application';
      this.currentRequestType = null;

      this.views = ['dashboard', 'form', 'inquiry'];
      this.form = document.getElementById('appForm');
      this.typeSelect = document.getElementById('typeSelect');
      this.typeSelectGroup = document.getElementById('typeSelectGroup');
      this.typeRestrictionNote = document.getElementById('typeRestrictionNote');
      this.requestTypeInput = document.getElementById('requestTypeInput');
      this.fileContainer = document.getElementById('fileUploadContainer');
      this.fileInput = document.getElementById('fileInput');
      this.fileInputLabel = document.getElementById('fileInputLabel');
      this.formTitle = document.getElementById('formTitle');
      this.submitBtn = document.getElementById('submitBtn');
      this.loader = document.getElementById('loader');
      this.grandTotalEl = document.getElementById('grandTotal');
      this.budgetInfo = document.getElementById('budgetInfo');
      this.budgetLimit = Number(document.getElementById('budgetLimit').value) || 0;
      this.settlementInfo = document.getElementById('settlementInfo');
      this.preAmountDisplay = document.getElementById('preAmountDisplay');
      this.settlementTotalDisplay = document.getElementById('settlementTotalDisplay');
      this.balanceDisplay = document.getElementById('balanceDisplay');
      this.itemsTable = new ItemsTableController(
        document.getElementById('itemsBody'),
        this.grandTotalEl,
        this.allowedItems
      );
      this.logger.log('constructed', {
        allowedItemCount: this.allowedItems.length,
        hasUnsettledData: Boolean(this.unsettledData)
      });
    }

    init() {
      const timer = this.logger.startTimer('init');
      document
        .getElementById('startApplicationBtn')
        .addEventListener('click', () => this.startApplication());
      document
        .getElementById('startSettlementBtn')
        .addEventListener('click', () => this.startSettlement());
      document
        .getElementById('startInquiryBtn')
        .addEventListener('click', () => this.switchView('inquiry'));
      document
        .getElementById('addRowBtn')
        .addEventListener('click', () => this.addRow());

      this.typeSelect.addEventListener('change', () => this.handleTypeChange());
      this.form.addEventListener('submit', (event) => this.handleFormSubmit(event));

      const inquiryForm = document.getElementById('inquiryForm');
      if (inquiryForm) {
        inquiryForm.addEventListener('submit', (event) => this.handleInquirySubmit(event));
      }

      this.renderDashboardRestrictions();
      this.populateTypeOptions();
      this.applyApplicationMode();
      this.switchView('dashboard');
      timer.end({
        applicationTypeCount: this.getApplicationTypes().length
      });
    }

    switchView(viewName) {
      this.logger.log('switchView', {
        viewName
      });
      this.views.forEach((name) => {
        const element = document.getElementById(`view-${name}`);
        if (element) {
          element.style.display = name === viewName ? 'block' : 'none';
        }
      });
      window.scrollTo(0, 0);
    }

    startApplication() {
      this.logger.log('startApplication');
      if (!this.hasAvailableApplicationType()) {
        alert('現在、新しい支出申請を開始できません。進行中の申請を確認してください。');
        return;
      }

      this.populateTypeOptions();
      this.applyApplicationMode();
      this.switchView('form');
    }

    startSettlement() {
      this.logger.log('startSettlement', {
        hasUnsettledData: Boolean(this.unsettledData)
      });
      if (!this.unsettledData) {
        alert('現在、通常精算が必要な通常請求はありません。');
        return;
      }

      this.applySettlementMode();
      this.switchView('form');
    }

    addRow() {
      this.itemsTable.addRows(1);
      this.updateSummary();
      this.logger.log('addRow');
    }

    handleTypeChange() {
      if (this.mode !== 'application') {
        return;
      }

      this.applyApplicationMode();
    }

    applyApplicationMode() {
      this.mode = 'application';
      const state = this.buildApplicationState();
      this.renderFormState(state);
      this.itemsTable.reset(state.requestType || '事後請求');
      this.updateSummary();
      this.logger.log('applyApplicationMode', {
        requestType: state.requestType
      });
    }

    applySettlementMode() {
      this.mode = 'settlement';
      const state = this.buildSettlementState();
      this.renderFormState(state);
      this.itemsTable.reset('通常精算');
      this.updateSummary();
      this.logger.log('applySettlementMode');
    }

    buildApplicationState() {
      const availableTypes = this.getApplicationTypes();
      const resolvedType = this.resolveApplicationType(this.typeSelect.value);

      return {
        title: '支出申請',
        requestType: resolvedType,
        showTypeSelector: true,
        showFileUpload: resolvedType === '事後請求',
        fileRequired: resolvedType === '事後請求',
        fileLabel: (this.bootstrap && this.bootstrap.receiptLabel) || '領収書(レシート)',
        fileAccept: (this.bootstrap && this.bootstrap.fileAccept) || 'application/pdf',
        settlementInfoVisible: false,
        budgetInfoVisible: true,
        submitLabel: availableTypes.some((type) => type.allowed) ? '申請する' : '申請できません'
      };
    }

    buildSettlementState() {
      return {
        title: '通常精算手続き',
        requestType: '通常精算',
        showTypeSelector: false,
        showFileUpload: true,
        fileRequired: true,
        fileLabel: (this.bootstrap && this.bootstrap.receiptLabel) || '領収書(レシート)',
        fileAccept: (this.bootstrap && this.bootstrap.fileAccept) || 'application/pdf',
        settlementInfoVisible: true,
        budgetInfoVisible: false,
        submitLabel: '通常精算する'
      };
    }

    renderFormState(state) {
      this.logger.log('renderFormState', {
        title: state.title,
        requestType: state.requestType,
        showTypeSelector: state.showTypeSelector,
        showFileUpload: state.showFileUpload
      });
      this.currentRequestType = state.requestType;
      this.requestTypeInput.value = state.requestType || '';
      this.formTitle.textContent = state.title;
      this.typeSelectGroup.style.display = state.showTypeSelector ? 'block' : 'none';
      this.fileContainer.style.display = state.showFileUpload ? 'block' : 'none';
      this.fileInput.required = Boolean(state.fileRequired);
      this.fileInput.accept = state.fileAccept;
      this.budgetInfo.style.display = state.budgetInfoVisible ? 'block' : 'none';
      this.settlementInfo.style.display = state.settlementInfoVisible ? 'block' : 'none';
      this.submitBtn.textContent = state.submitLabel;
      this.submitBtn.disabled = !state.requestType;
      this.submitBtn.style.backgroundColor = '#007bff';
      this.grandTotalEl.style.color = '#007bff';

      this.fileInputLabel.innerHTML = `${state.fileLabel} <span style="color:red; font-size:0.8em;">※必須</span>`;
      if (!state.showFileUpload) {
        this.fileInput.value = '';
      }

      if (this.unsettledData) {
        this.preAmountDisplay.textContent = `¥${Number(this.unsettledData.amount).toLocaleString()}`;
      } else {
        this.preAmountDisplay.textContent = '¥0';
      }

      this.renderTypeRestrictionNote();
    }

    renderDashboardRestrictions() {
      const startApplicationBtn = document.getElementById('startApplicationBtn');
      const startSettlementBtn = document.getElementById('startSettlementBtn');
      const restrictionBox = document.getElementById('requestRestrictionBox');
      const blockedMessages = this.getApplicationTypes()
        .filter((type) => !type.allowed && type.reason)
        .map((type) => `${type.label}: ${type.reason}`);

      startApplicationBtn.disabled = !this.hasAvailableApplicationType();
      startSettlementBtn.disabled = !this.unsettledData;

      if (blockedMessages.length === 0) {
        restrictionBox.style.display = 'none';
        restrictionBox.innerHTML = '';
        return;
      }

      restrictionBox.style.display = 'block';
      restrictionBox.innerHTML = blockedMessages.map((message) => `<p style="margin:0 0 8px 0;">${this.escapeHtml(message)}</p>`).join('');
    }

    renderTypeRestrictionNote() {
      const blockedMessages = this.getApplicationTypes()
        .filter((type) => !type.allowed && type.reason)
        .map((type) => `${type.label}: ${type.reason}`);

      if (blockedMessages.length === 0 || this.mode !== 'application') {
        this.typeRestrictionNote.style.display = 'none';
        this.typeRestrictionNote.textContent = '';
        return;
      }

      this.typeRestrictionNote.style.display = 'block';
      this.typeRestrictionNote.textContent = blockedMessages.join(' / ');
    }

    populateTypeOptions() {
      const applicationTypes = this.getApplicationTypes();
      this.typeSelect.innerHTML = '';

      applicationTypes.forEach((typeOption) => {
        const option = document.createElement('option');
        option.value = typeOption.value;
        option.textContent = typeOption.label;
        option.disabled = !typeOption.allowed;
        if (!typeOption.allowed && typeOption.reason) {
          option.title = typeOption.reason;
        }
        this.typeSelect.appendChild(option);
      });

      const resolvedType = this.resolveApplicationType(this.typeSelect.value);
      this.typeSelect.value = resolvedType || '';
      this.logger.log('populateTypeOptions', {
        optionCount: applicationTypes.length,
        resolvedType: this.typeSelect.value || null
      });
    }

    getApplicationTypes() {
      return Array.isArray(this.bootstrap.applicationTypes)
        ? this.bootstrap.applicationTypes
        : [];
    }

    hasAvailableApplicationType() {
      return this.getApplicationTypes().some((typeOption) => typeOption.allowed);
    }

    resolveApplicationType(selectedType) {
      const availableTypes = this.getApplicationTypes();
      const selectedOption = availableTypes.find((typeOption) => {
        return typeOption.value === selectedType && typeOption.allowed;
      });

      if (selectedOption) {
        return selectedOption.value;
      }

      return (availableTypes.find((typeOption) => typeOption.allowed) || {}).value || null;
    }

    updateSummary() {
      const total = this.itemsTable.calculateTotal();
      this.logger.log('updateSummary', {
        mode: this.mode,
        total,
        budgetLimit: this.budgetLimit
      });

      if (this.mode === 'settlement' && this.unsettledData) {
        const preAmount = Number(this.unsettledData.amount) || 0;
        const balance = preAmount - total;
        this.settlementTotalDisplay.textContent = `¥${total.toLocaleString()}`;

        if (balance >= 0) {
          this.balanceDisplay.textContent = `¥${balance.toLocaleString()}`;
          this.balanceDisplay.style.color = '#28a745';
          this.submitBtn.textContent = '通常精算する';
        } else {
          this.balanceDisplay.textContent = `不足 ¥${Math.abs(balance).toLocaleString()}`;
          this.balanceDisplay.style.color = '#dc3545';
          this.submitBtn.textContent = '通常精算（追加請求）';
        }

        this.submitBtn.disabled = false;
        return;
      }

      if (!this.currentRequestType) {
        this.submitBtn.disabled = true;
        this.submitBtn.textContent = '申請できません';
        return;
      }

      if (total > this.budgetLimit) {
        this.submitBtn.disabled = true;
        this.submitBtn.textContent = '予算オーバーです';
        this.submitBtn.style.backgroundColor = '#dc3545';
        this.grandTotalEl.style.color = '#dc3545';
        return;
      }

      this.submitBtn.disabled = false;
      this.submitBtn.textContent = '申請する';
      this.submitBtn.style.backgroundColor = '#007bff';
      this.grandTotalEl.style.color = '#007bff';
    }

    handleFormSubmit(event) {
      const timer = this.logger.startTimer('handleFormSubmit');
      event.preventDefault();

      if (!this.currentRequestType) {
        timer.end({
          success: false,
          reason: 'no-request-type'
        });
        alert('現在この申請は利用できません。');
        return;
      }

      const items = this.itemsTable.getItems();
      if (items.length === 0) {
        timer.end({
          success: false,
          reason: 'no-items'
        });
        alert('少なくとも1つの品目を入力してください。');
        return;
      }

      const file = this.fileInput.files[0] || null;
      if (!this.validateFile(file)) {
        timer.end({
          success: false,
          reason: 'file-validation'
        });
        return;
      }

      this.submitBtn.disabled = true;
      this.loader.style.display = 'block';

      const sendData = (fileInfo) => {
        this.logger.log('processForm.request', {
          requestType: this.currentRequestType,
          itemCount: items.length,
          totalAmount: this.grandTotalEl.dataset.value,
          hasFile: Boolean(fileInfo)
        });
        google.script.run
          .withSuccessHandler((result) => {
            if (result.success) {
              timer.end({
                success: true,
                requestType: this.currentRequestType
              });
              alert(result.message);
              if (typeof APP_URL !== 'undefined' && APP_URL) {
                window.top.location.href = APP_URL;
              } else {
                window.parent.location.reload();
              }
              return;
            }

            timer.end({
              success: false,
              message: result.message
            });
            alert(result.message);
            this.resetSubmitState();
          })
          .withFailureHandler((error) => {
            timer.fail(error, {
              requestType: this.currentRequestType
            });
            alert(`エラー: ${error}`);
            this.resetSubmitState();
          })
          .processForm({
            type: this.currentRequestType,
            totalAmount: this.grandTotalEl.dataset.value,
            itemsJson: JSON.stringify(items),
            fileName: fileInfo ? fileInfo.name : null,
            fileData: fileInfo ? fileInfo.data : null,
            mimeType: fileInfo ? fileInfo.mime : null
          });
      };

      if (file) {
        this.logger.log('readFile.start', {
          fileName: file.name,
          mimeType: file.type,
          size: file.size
        });
        const reader = new FileReader();
        reader.onload = (loadEvent) => {
          const fileResult = loadEvent.target && typeof loadEvent.target.result === 'string'
            ? loadEvent.target.result
            : '';
          if (!fileResult) {
            timer.end({
              success: false,
              reason: 'file-read-failed'
            });
            alert('ファイルの読み込みに失敗しました。');
            this.resetSubmitState();
            return;
          }
          this.logger.log('readFile.end', {
            fileName: file.name,
            size: file.size
          });
          sendData({
            name: file.name,
            data: fileResult.split(',')[1],
            mime: file.type
          });
        };
        reader.readAsDataURL(file);
      } else {
        sendData(null);
      }
    }

    handleInquirySubmit(event) {
      const timer = this.logger.startTimer('handleInquirySubmit');
      event.preventDefault();

      const inquiryForm = event.currentTarget;
      const submitButton = document.getElementById('inquirySubmitBtn');
      const loader = document.getElementById('inquiryLoader');
      submitButton.disabled = true;
      loader.style.display = 'block';

      google.script.run
        .withSuccessHandler((result) => {
          timer.end({
            success: Boolean(result && result.success)
          });
          alert(result.message);
          if (result.success) {
            inquiryForm.reset();
            this.switchView('dashboard');
          }
          submitButton.disabled = false;
          loader.style.display = 'none';
        })
        .withFailureHandler((error) => {
          timer.fail(error);
          alert(`エラー: ${error}`);
          submitButton.disabled = false;
          loader.style.display = 'none';
        })
        .processInquiry({
          subject: inquiryForm.subject.value,
          message: inquiryForm.message.value
        });
    }

    validateFile(file) {
      this.logger.log('validateFile', {
        hasFile: Boolean(file),
        fileName: file ? file.name : null,
        mimeType: file ? file.type : null
      });
      if (!file && this.fileInput.required) {
        alert('領収書(レシート)の PDF を添付してください。');
        return false;
      }

      if (!file) {
        return true;
      }

      const isPdf = file.type === 'application/pdf' || /\.pdf$/i.test(file.name);
      if (!isPdf) {
        this.logger.warn('validateFile.invalidPdf', {
          fileName: file.name,
          mimeType: file.type
        });
        alert('添付できるファイルは PDF のみです。');
        return false;
      }

      return true;
    }

    resetSubmitState() {
      this.loader.style.display = 'none';
      this.updateSummary();
      this.logger.log('resetSubmitState');
    }

    escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  }

  const userDashboardApp = new UserDashboardApp(
    USER_FORM_BOOTSTRAP,
    ALLOWED_ITEMS,
    UNSETTLED_DATA
  );

  window.switchView = function (viewName) {
    userDashboardApp.switchView(viewName);
  };

  window.startApplication = function () {
    userDashboardApp.startApplication();
  };

  window.startSettlement = function () {
    userDashboardApp.startSettlement();
  };

  window.addEventListener('DOMContentLoaded', () => {
    userDashboardApp.init();
  });
</script>
