<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <?!= include('css'); ?>
    <style>
      .admin-container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; }
      .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
      .nav-btn { background: none; border: none; font-size: 1.1em; padding: 10px 20px; cursor: pointer; color: #666; font-weight: bold; }
      .nav-btn.active { color: #007bff; border-bottom: 3px solid #007bff; }
      
      .data-table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
      .data-table th { background: #343a40; color: #fff; padding: 10px; position: sticky; top: 0; }
      .data-table td { border-bottom: 1px solid #ddd; padding: 10px; vertical-align: middle; }
      .data-table tr:hover { background-color: #f8f9fa; }
      
      .status-select { padding: 5px; border-radius: 4px; border: 1px solid #ced4da; font-weight: bold; }
      /* ステータスごとの色 */
      .st-pending { color: #d35400; }
      .st-approved { color: #27ae60; }
      .st-unsettled { color: #8e44ad; }
      .st-rejected { color: #c0392b; }
      
      .link-btn { text-decoration: none; background: #17a2b8; color: white; padding: 3px 8px; border-radius: 3px; font-size: 0.8em; }
      .refresh-btn { float: right; background: #28a745; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="admin-container">
      <div style="display:flex; justify-content:space-between; align-items:center;">
      <h1>会計管理ダッシュボード</h1>
    <div>
    <a href="<?= ScriptApp.getService().getUrl() ?>?role=user" style="margin-right:15px; font-size:0.9em;">申請画面へ切替</a>
    <button class="refresh-btn" onclick="loadData()">↻ 更新</button>
  </div>
</div>

      <div class="nav-tabs">
        <button class="nav-btn active" onclick="showTab('expenditure')">支出・精算管理</button>
        <button class="nav-btn" onclick="showTab('inquiry')">お問い合わせ管理</button>
      </div>

      <div id="tab-expenditure">
        <div class="table-responsive">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th><th>日付</th><th>団体名</th><th>タイプ</th><th>金額</th><th>内容</th><th>証憑</th><th>ステータス変更</th>
              </tr>
            </thead>
            <tbody id="expBody">
              <tr><td colspan="8" style="text-align:center;">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div id="tab-inquiry" style="display:none;">
        <div class="table-responsive">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th><th>日付</th><th>団体名</th><th>送信者</th><th>件名</th><th>本文</th><th>ステータス変更</th>
              </tr>
            </thead>
            <tbody id="inqBody">
              <tr><td colspan="7" style="text-align:center;">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      window.onload = loadData;

      function loadData() {
        document.getElementById('expBody').innerHTML = '<tr><td colspan="8" style="text-align:center;">読み込み中...</td></tr>';
        
        google.script.run.withSuccessHandler(renderData).getAdminDashboardData();
      }

      function renderData(data) {
        renderExpenditure(data.expenditures);
        renderInquiry(data.inquiries);
      }

      function renderExpenditure(list) {
        const tbody = document.getElementById('expBody');
        tbody.innerHTML = '';
        if(list.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">データなし</td></tr>';
          return;
        }

        list.forEach(item => {
          const tr = document.createElement('tr');
          const fileLink = item.file && item.file !== 'なし' ? `<a href="${item.file}" target="_blank" class="link-btn">確認</a>` : '-';
          
          // ステータスプルダウン
          const options = ['申請中', '承認済', '未精算', '精算完了', '却下']
            .map(opt => `<option value="${opt}" ${item.status === opt ? 'selected' : ''}>${opt}</option>`)
            .join('');

          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${item.date}</td>
            <td><strong>${item.group}</strong></td>
            <td>${item.type}</td>
            <td>¥${Number(item.amount).toLocaleString()}</td>
            <td style="max-width:200px; font-size:0.8em;">${item.content}</td>
            <td>${fileLink}</td>
            <td>
              <select class="status-select" onchange="updateStatus('expenditure', ${item.rowIndex}, this.value)">
                ${options}
              </select>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      function renderInquiry(list) {
        const tbody = document.getElementById('inqBody');
        tbody.innerHTML = '';
        if(list.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">データなし</td></tr>';
          return;
        }

        list.forEach(item => {
          const tr = document.createElement('tr');
          // ステータスプルダウン
          const options = ['未対応', '対応中', '完了']
            .map(opt => `<option value="${opt}" ${item.status === opt ? 'selected' : ''}>${opt}</option>`)
            .join('');

          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${item.date}</td>
            <td>${item.group}</td>
            <td style="font-size:0.8em;">${item.sender}</td>
            <td>${item.subject}</td>
            <td style="max-width:300px; font-size:0.8em;">${item.message}</td>
            <td>
              <select class="status-select" onchange="updateStatus('inquiry', ${item.rowIndex}, this.value)">
                ${options}
              </select>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      function updateStatus(type, rowIndex, newVal) {
        google.script.run
          .withSuccessHandler(() => {
            // 更新成功時は特に何もしない（トースト通知などを出しても良い）
            console.log("Updated!");
          })
          .withFailureHandler((e) => alert("更新エラー: " + e))
          .updateStatus(type, rowIndex, newVal);
      }

      // タブ切り替え
      function showTab(tabName) {
        document.getElementById('tab-expenditure').style.display = 'none';
        document.getElementById('tab-inquiry').style.display = 'none';
        document.getElementById('tab-' + tabName).style.display = 'block';

        const btns = document.querySelectorAll('.nav-btn');
        btns.forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
      }
    </script>
  </body>
</html>
