<style>
  /* 全体のスタイルは以前のまま */
  body { 
    font-family: 'Helvetica Neue', Arial, sans-serif; 
    background-color: #f4f7f6; 
    padding: 20px; 
    color: #333;
  }
  .container { 
    max-width: 800px; 
    margin: 0 auto; 
    background: #fff; 
    padding: 30px; 
    border-radius: 8px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
  }
  
  /* --- ダッシュボード用スタイル --- */
  .budget-summary {
    display: flex;
    justify-content: space-around;
    padding: 10px;
    background: #fff;
    border-radius: 5px;
  }
  .budget-summary div { text-align: center; }
  .budget-summary .label { display: block; font-size: 0.9em; color: #666; margin-bottom: 5px; }
  .budget-summary .value { font-size: 1.5em; font-weight: bold; }
  .budget-summary .highlight { color: #007bff; }

  /* アクションボタン（でかいボタン） */
  .action-buttons {
    display: flex;
    gap: 15px;
    margin: 30px 0;
  }
  .btn-large {
    flex: 1;
    padding: 20px;
    border: none;
    border-radius: 8px;
    font-size: 1.1em;
    font-weight: bold;
    color: white;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-expenditure { background: linear-gradient(135deg, #007bff, #0056b3); }
  .btn-settlement { background: linear-gradient(135deg, #28a745, #218838); }
  
  .btn-large:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
  .btn-large:disabled {
    cursor: not-allowed;
    opacity: 0.6;
    transform: none;
    box-shadow: none;
  }
  .icon { font-size: 1.5em; }

  /* 戻るボタン */
  .btn-back {
    background: none; border: none; color: #666; cursor: pointer;
    font-size: 0.9em; margin-bottom: 10px; padding: 0;
  }
  .btn-back:hover { text-decoration: underline; color: #333; }

  /* 履歴テーブル */
  .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  .history-table th { background: #f8f9fa; padding: 10px; text-align: left; font-size: 0.9em; border-bottom: 2px solid #dee2e6; }
  .history-table td { padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 0.95em; }
  
  /* ステータスバッジ */
  .badge {
    padding: 4px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold;
    display: inline-block; min-width: 60px; text-align: center;
    background: #e2e6ea; color: #495057; /* デフォルト(申請中) */
  }
  .status-ok { background: #d4edda; color: #155724; } /* 承認済/完了 */
  .status-warn { background: #fff3cd; color: #856404; } /* 未精算 */
  .status-ng { background: #f8d7da; color: #721c24; } /* 却下 */

  /* 既存のフォーム用スタイル（省略せず記述） */
  .info-box { background: #eef2f5; padding: 15px; border-radius: 6px; margin-bottom: 25px; border-left: 5px solid #007bff; }
  .info-box-warning { background: #fff7e6; border-left-color: #f39c12; }
  .compact-info { padding: 10px; }
  .settlement-box { background: #e8f5e9; border-left-color: #28a745; }
  h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
  h2 { margin: 0 0 10px 0; font-size: 1.2em; color: #333; }
  .form-group { margin-bottom: 25px; }
  label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
  .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
  
  /* テーブルスタイル */
  .table-responsive { overflow-x: auto; }
  #itemsTable { width: 100%; border-collapse: collapse; min-width: 600px; }
  #itemsTable th, #itemsTable td { border: 1px solid #ddd; padding: 8px; text-align: center; }
  #itemsTable th { background: #f8f9fa; }
  .input-sm { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 4px; }
  .btn-secondary { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
  .del-btn { background: #dc3545; color: white; border: none; border-radius: 4px; width: 30px; height: 30px; cursor: pointer; }
  #grandTotal { font-weight: bold; font-size: 1.2em; color: #007bff; }
  
  .btn-primary { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; margin-top: 10px; }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .loader { text-align: center; margin-top: 15px; color: #666; font-weight: bold; }
  .inline-notice {
    margin-top: 8px;
    margin-bottom: 0;
    color: #666;
    font-size: 0.9em;
  }
  .calc-operator {
    font-size: 1.5em;
    padding-top: 5px;
  }
  /* お問い合わせボタン用スタイル */
  .btn-inquiry { 
  background: linear-gradient(135deg, #f39c12, #d35400); 
  margin-top: 15px; /* 上のボタンと少し離す */
  }
  .inquiry-submit-btn {
    background-color: #f39c12;
    border-color: #e67e22;
  }
  .info-text {
  text-align: center;
  color: #666;
  font-size: 0.9em;
  margin-bottom: 20px;
}
</style>
