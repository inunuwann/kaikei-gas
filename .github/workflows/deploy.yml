name: Deploy GAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # actions/setup-node の代わりに mise-action を使用
      - uses: jdxcode/mise-action@v2
        with:
          # mise.toml に基づいてツールをインストール
          install: true
          # キャッシュを有効化（npm install を高速化）
          cache: true

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Create clasprc.json
        run: echo "$CLASPRC_JSON" > ~/.clasprc.json
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: clasp push
        run: npx clasp push --force
