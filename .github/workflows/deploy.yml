name: Deploy GAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # actions/setup-node の代わりに mise-action を使用
      - uses: jdx/mise-action@v3
        with:
          # mise.toml に基づいてツールをインストール
          install: true
          # キャッシュを有効化（npm install を高速化）
          cache: true

      - name: Install dependencies
        run: mise run ci-install

      - name: Build project
        run: mise run build

      - name: Create .clasp.json
        run: |
          cat > .clasp.json <<'EOF'
          {
            "scriptId": "1qiCeeBTPEVEMcfWVE9HXHuCSq0xyUKBtCcRUnnD6sDlkBp9s2L4xZIkl",
            "rootDir": "./dist",
            "scriptExtensions": [".js", ".gs"],
            "htmlExtensions": [".html"],
            "jsonExtensions": [".json"],
            "filePushOrder": [],
            "skipSubdirectories": false
          }
          EOF

      - name: Create clasprc.json
        run: echo "$CLASPRC_JSON" > ~/.clasprc.json
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      # 1. まずコード本体をGASプロジェクトへアップロード（エディタ上のコードが最新になる）
      - name: clasp push
        run: mise run deploy

      # 2. 現在のデプロイIDを維持したままバージョンを更新（WebアプリのURLは変わらない）
      - name: clasp deploy
        env:
          DEPLOYMENT_ID: ${{ secrets.DEPLOYMENT_ID }}
        run: |
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "Error: DEPLOYMENT_ID secret is missing!"
            exit 1
          fi
          npx @google/clasp deploy -i "$DEPLOYMENT_ID" -d "Auto-deploy via GitHub Actions #${{ github.run_number }}"
